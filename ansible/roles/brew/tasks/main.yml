---
- name: Check if Homebrew is installed
  stat:
    path: /home/linuxbrew/.linuxbrew/bin/brew
  register: brew_check

- name: Install Homebrew
  shell: |
    /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  when: not brew_check.stat.exists
  become: no

- name: Ensure Homebrew is in PATH for this session
  set_fact:
    ansible_env_path: "{{ ansible_env.PATH }}:/home/linuxbrew/.linuxbrew/bin"

- name: Update Homebrew
  homebrew:
    update_homebrew: yes
  become: no

- name: Install packages via Brewfile
  command: brew bundle --file={{ playbook_dir }}/../Brewfile
  become: no
