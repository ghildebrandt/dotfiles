---
- name: Create VS Code settings directory
  file:
    path: ~/.config/Code/User
    state: directory

- name: Link VS Code settings (when available)
  file:
    src: "{{ playbook_dir }}/../home/.config/Code/User/settings.json"
    dest: ~/.config/Code/User/settings.json
    state: link
    force: true
  when: ansible_os_family == "Debian"
